[hn_rerank]
username = "pure_coder"
output = "public/index.html"
days = 30
count = 40
no_rss = false
no_tldr = false
debug_scores = true

[hn_rerank.llm]
provider = "mistral"

# Current runtime ranking config

[hn_rerank.semantic]
knn_neighbors = 5

[hn_rerank.classifier]
k_feat = 12
raw_embedding_features = false
features = [
    "centroid", "pos_knn", "neg_knn", "pos_neg_ratio",
    "log_points", "log_comments", "comment_ratio",
    "title_len", "text_len", "is_github", "is_pdf", "comments_count",
    "closest_pos", "closest_neg", "closest_margin",
    "is_hn",
    "source_trust",
    "local_density",
    "story_age",
    "cluster_size",
    "domain_recency",
    "embedding_magnitude",
]

[hn_rerank.clustering]
similarity_threshold = 0.55
outlier_similarity_threshold = 0.0
min_samples_per_cluster = 1
max_cluster_fraction = 0.25
max_cluster_size = 40
refine_iters = 2

[hn_rerank.archive]
open_index_enabled = true
use_cached_stories = true
open_index_candidate_limit = 500

[hn_rerank.explore]
enabled = true
slots = 7

[hn_rerank.single_model]
min_positive_labels = 10
min_negative_labels = 10
balance_training_labels = true
model_type = "mlp"
svm_kernel = "rbf"
svm_c = 1.0
svm_gamma = "scale"
# Switched to MLP (64->32) 2026-06-15 - avoids score saturation.
# 22f CV ablation: NDCG@30 MLP=0.187, hit@30=0.800 (SVM saturates at 0.475 NDCG).
# MLP's non-linear hidden layer spreads probability scores, no tie-breaking needed.
# See AGENTS.md for full eval results.
