[hn_rerank]
username = "pure_coder"
output = "public/index.html"
days = 30
clusters = 30
count = 40
no_rss = false
no_tldr = false
debug_scores = false

[hn_rerank.llm]
provider = "mistral"

# Balanced Hybrid Ranking (Linear 85/5/10 split)

[hn_rerank.ranking]
negative_weight = 0.6
max_results = 500

[hn_rerank.adaptive_hn]
weight_min = 0.05
weight_max = 0.05
threshold_young = 24.0
threshold_old = 720.0
score_normalization_cap = 2500.0

[hn_rerank.freshness]
enabled = true
half_life_hours = 168.0
max_boost = 0.10

[hn_rerank.recency]
enabled = false

[hn_rerank.semantic]
maxsim_weight = 1.0
meansim_weight = 0.0
knn_neighbors = 1

[hn_rerank.classifier]
k_feat = 1
neg_sample_weight = 1.67
use_balanced_class_weight = true
cv_scoring = "f1"
use_local_hidden_penalty = false
local_hidden_penalty_weight = 0.0
local_hidden_penalty_k = 3
use_neg_knn_feature = false

[hn_rerank.clustering]
algorithm = "agglomerative"
linkage = "ward"
metric = "euclidean"
distance_threshold = 0.75
similarity_threshold = 0.91
outlier_similarity_threshold = 0.0
min_samples_per_cluster = 1
max_cluster_fraction = 0.25
max_cluster_size = 40
refine_iters = 2
