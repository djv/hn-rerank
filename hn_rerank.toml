[hn_rerank]
username = "pure_coder"
days = 7
clusters = 30
count = 40
no_rss = false
no_tldr = true
debug_scores = false

# Tuned Hyperparameters (80-trial classifier retune on story-content v2 caches - 2026-03-08)

[hn_rerank.ranking]
negative_weight = 0.5952
max_results = 500

[hn_rerank.adaptive_hn]
weight_min = 0.06
weight_max = 0.09
threshold_young = 5.84
threshold_old = 50.12
score_normalization_cap = 1392.41

[hn_rerank.freshness]
enabled = true
half_life_hours = 66.01
max_boost = 0.02

[hn_rerank.recency]
enabled = false
half_life_days = 90.0

[hn_rerank.semantic]
maxsim_weight = 0.95
meansim_weight = 0.05
sigmoid_k = 31.22
sigmoid_threshold = 0.47
knn_sigmoid_k = 6.35
knn_maxsim_weight = 0.26
knn_neighbors = 3

[hn_rerank.classifier]
k_feat = 1
neg_sample_weight = 1.67
use_neg_knn_feature = false

[hn_rerank.clustering]
similarity_threshold = 0.91
outlier_similarity_threshold = 0.87
min_samples_per_cluster = 2
max_cluster_fraction = 0.25
max_cluster_size = 40
refine_iters = 2
