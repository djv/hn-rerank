[hn_rerank]
username = "pure_coder"
output = "public/index.html"
days = 7
clusters = 30
count = 50
candidates = 1000
no_rss = false
no_tldr = false
debug_scores = false

[hn_rerank.llm]
provider = "mistral"

# Balanced Hybrid Ranking (Linear 85/5/10 split)

[hn_rerank.ranking]
negative_weight = 0.26932
non_semantic_weight = 1.0
comment_ratio = 0.9585070171
max_results = 500

[hn_rerank.adaptive_hn]
weight_min = 0.3963567514
weight_max = 0.4454707212
threshold_young = 69.1427531319
threshold_old = 720.0
score_normalization_cap = 212.4038210119

[hn_rerank.freshness]
enabled = true
half_life_hours = 168.0
max_boost = 0.10

[hn_rerank.recency]
enabled = false

[hn_rerank.semantic]
maxsim_weight = 1.0
meansim_weight = 0.0
knn_neighbors = 6

[hn_rerank.classifier]
scoring_mode = "pairwise_logistic"
feature_mode = "bottleneck"
pairwise_negatives = 15
pairwise_c = 0.21448
k_feat = 7
use_balanced_class_weight = false
cv_scoring = "f1"
use_local_hidden_penalty = false
local_hidden_penalty_weight = 0.0
local_hidden_penalty_k = 3
use_neg_knn_feature = true
use_log_points_feature = false

[hn_rerank.clustering]
algorithm = "agglomerative"
linkage = "ward"
metric = "euclidean"
distance_threshold = 1.57824
similarity_threshold = 0.75
outlier_similarity_threshold = 0.0
min_samples_per_cluster = 1
max_cluster_fraction = 0.25
max_cluster_size = 40
refine_iters = 2

[hn_rerank.cross_encoder]
enabled = true
top_n = 80
weight = 0.06953

[hn_rerank.archive]
open_index_enabled = true
use_cached_stories = true
open_index_candidate_limit = 50
