[hn_rerank]
username = "pure_coder"
output = "public/index.html"
days = 30
count = 40
no_rss = false
no_tldr = false
debug_scores = true

[hn_rerank.llm]
provider = "mistral"

# Current runtime ranking config

[hn_rerank.semantic]
knn_neighbors = 5

[hn_rerank.classifier]
k_feat = 12
raw_embedding_features = true
features = [
    "centroid", "pos_knn", "neg_knn", "pos_neg_ratio",
    "title_len", "text_len", "is_github", "is_pdf",
    "closest_pos", "closest_neg", "closest_margin",
    "is_hn",
    "source_trust",
    "local_density",
    "cluster_size",
    "embedding_magnitude",
]

[hn_rerank.clustering]
similarity_threshold = 0.55
outlier_similarity_threshold = 0.0
min_samples_per_cluster = 1
max_cluster_fraction = 0.25
max_cluster_size = 40
refine_iters = 2

[hn_rerank.archive]
open_index_enabled = true
use_cached_stories = true
open_index_candidate_limit = 500

[hn_rerank.explore]
enabled = true
slots = 7

[hn_rerank.single_model]
min_positive_labels = 10
min_negative_labels = 10
balance_training_labels = true
model_type = "mlp"
mlp_solver = "lbfgs"
mlp_hidden_layers = "32"
mlp_alpha = 0.1
mlp_learning_rate_init = 0.01
mlp_activation = "relu"
svm_kernel = "rbf"
svm_c = 0.3
svm_gamma = "scale"
# Switched to MLP LBFGS 2026-06-16 from SVM RBF
# Tuned MLP config: solver=lbfgs, alpha=0.1, hidden_layers="32", lr_init=0.01
# With 16 metadata features + 384 raw embeddings, this config achieved NDCG@30=0.992
# in content-based 3-fold cross-validation.
