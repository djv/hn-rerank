[hn_rerank]
username = "pure_coder"
output = "public/index.html"
days = 30
count = 40
no_rss = false
no_tldr = false
debug_scores = true

[hn_rerank.ranking]
external_min_model_score = 0.52

[hn_rerank.llm]
provider = "mistral"

# Current runtime ranking config

[hn_rerank.semantic]
knn_neighbors = 5

[hn_rerank.classifier]
k_feat = 12
features = [
    "centroid", "pos_knn", "neg_knn",
    "log_points", "log_comments", "comment_ratio",
    "title_len", "text_len", "has_url", "is_github", "is_pdf", "comments_count",
    "closest_pos", "closest_neg", "closest_margin",
]

[hn_rerank.clustering]
similarity_threshold = 0.55
outlier_similarity_threshold = 0.0
min_samples_per_cluster = 1
max_cluster_fraction = 0.25
max_cluster_size = 40
refine_iters = 2

[hn_rerank.archive]
open_index_enabled = true
use_cached_stories = true
open_index_candidate_limit = 500

[hn_rerank.single_model]
min_positive_labels = 10
min_negative_labels = 10
balance_training_labels = true
model_type = "svm"
svm_kernel = "rbf"
svm_c = 1.0
svm_gamma = "scale"
# MiniLM + SVM RBF C=1.0 g=scale winner: NDCG@10 0.773 (300cand) / 0.817 (1300cand)
# Grid sweep 2026-05-31 across C∈{0.3,1,3,10,30}, γ∈{scale,auto,0.001,0.003,0.01,0.03}
# Best: C=1.0 g=scale/auto. C=3.0 baseline gave 0.675 at 1300cand.
# See docs/evals/embedding_context_candidate_sweep.md
